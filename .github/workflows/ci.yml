name: CI (Lint & Build)

# Pull request'lerde ve main'e push'ta projeyi doğrular: bağımlılıkları
# kurar, lint çalıştırır ve sunucu modunda build alır (Faz 0'dan beri
# statik export değil — bkz. next.config.ts). Böylece bozuk/çakışan
# değişiklikler merge edilmeden önce yakalanır.
# (Deploy ayrı bir workflow'dadır: deploy-godaddy.yml — Faz 3 cutover'da
# Vercel'e geçince emekli olacak.)

on:
  pull_request:
  push:
    branches:
      - main

# Aynı dal için eski çalışmaları iptal et (kaynak tasarrufu)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    runs-on: ubuntu-latest
    # Faz 1'den itibaren blog sayfaları SSG prerender sırasında DB okur; bu
    # yüzden CI'nın (hem test hem build) erişebileceği boş-şemalı bir Postgres
    # gerekir. Boş blog_posts tablosu sorun değil (generateStaticParams []).
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: ozsaye
          POSTGRES_PASSWORD: ozsaye
          POSTGRES_DB: ozsaye
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ozsaye"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # CI-özel değerler — GERÇEK gizli DEĞİL. Build/test yalnızca yerel
      # service'e karşı çalışır; CI hiçbir zaman gerçek sunucu çalıştırmaz veya
      # oturum imzalamaz. SESSION_SECRET auth modülünde build zamanında (modül
      # yüklenirken) fail-fast tetiklediği için gereklidir. Üretimde gerçek
      # değerler Vercel env'inde (Faz 3).
      DATABASE_URL: postgres://ozsaye:ozsaye@localhost:5432/ozsaye
      SESSION_SECRET: ci-build-zamani-gercek-olmayan-deger
      APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js kurulumu
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: DB migration (CI service'ine)
        # `npm run db:migrate` DEĞİL: o script --env-file=.env.local ister ve o
        # dosya CI'da yok. Env job-level'dan (DATABASE_URL) geliyor.
        run: npx tsx scripts/db-migrate.ts

      - name: Testler
        run: npm test

      - name: Build (sunucu modu)
        run: npm run build
