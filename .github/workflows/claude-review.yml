name: Claude PR Review

# PR açıldığında/güncellendiğinde, bağımsız (sıfır bağlamlı) bir Claude oturumu
# değişiklikleri inceler ve bulgularını PR'a yorum olarak ekler.
# scripts/review.sh ile aynı amaca hizmet eder; bu sürüm CI'da otomatik çalışır.
#
# Kimlik doğrulama: depoya kurulu Claude GitHub App (OIDC) üzerinden yapılır;
# ayrı bir API anahtarı secret'ı gerekmez. (İlk ekleyen PR'da GitHub güvenlik
# gereği bir kez "atlanır"; main'e merge edildikten sonra çalışır.)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Fork'lardan gelen PR'larda çalıştırma (App erişimi olmaz)
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--max-turns 20"
          prompt: |
            Sen kıdemli, titiz ve BAĞIMSIZ bir kod gözden geçiricisin. Bu Pull
            Request'in değişikliklerini sıfırdan, önyargısız incele.

            Bağlam: Next.js 16 App Router + React 19 + Tailwind v4, TypeScript,
            `output: export` ile statik export (GoDaddy'de saf HTML). Türkçe
            içerik. Marka kütüphanesi `scripts/lib/brand.cjs`.

            Şunlara odaklan:
            - Doğruluk hataları ve kenar durumları
            - Güvenlik / gizli bilgi sızıntısı / XSS (özellikle dangerouslySetInnerHTML, dış veri)
            - Next.js 16 statik export uyumu (force-static, generateStaticParams vb.)
            - Türkçe karakter / encoding sorunları
            - Ölü kod, kullanılmayan değişken, tutarsızlık, gereksiz tekrar

            Bulgularını PR'a TEK bir kısa Türkçe yorum olarak ekle. Her bulgu:
            **[Yüksek|Orta|Düşük]** `dosya:satır` — sorun. Öneri: ...
            Belirgin sorun yoksa bunu açıkça yaz. Kod DEĞİŞTİRME; yalnızca yorum yap.
