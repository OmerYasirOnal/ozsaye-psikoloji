name: GoDaddy'ye Deploy (FTP)

# DEVRE DIŞI (yalnız elle tetikleme): Statik export Faz 0'da kaldırıldı
# (`output: "export"` gitti), bu yüzden `npm run build` artık `out/` ÜRETMİYOR
# — otomatik push tetikleyicisi çalışsaydı her main push'unda bozulurdu.
# Canlı GoDaddy sitesi, Faz 3 (Vercel cutover) tamamlanana kadar son statik
# deploy'da DONMUŞ kalır (plan bu). Bu workflow Faz 3'te tamamen silinecek;
# o zamana kadar yalnızca Actions sekmesinden elle tetiklenebilir.
#
# Statik siteyi build edip GoDaddy paylaşımlı hosting'e (Apache/FTP) yükler.
# Çalışması için repo Settings > Secrets and variables > Actions altında
# şu secret'lar tanımlanmalıdır:
#   FTP_SERVER    -> ör. ftp.ozsaye.com  (GoDaddy cPanel > FTP Hesapları)
#   FTP_USERNAME  -> FTP kullanıcı adı
#   FTP_PASSWORD  -> FTP şifresi
# Opsiyonel:
#   FTP_SERVER_DIR sabiti aşağıda; WordPress'i koruyup alt klasöre
#   yüklemek için "public_html/yeni/" gibi değiştirin.

on:
  workflow_dispatch: # Yalnız Actions sekmesinden elle tetikleme (push tetikleyicisi Faz 0'da kaldırıldı)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js kurulumu
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Statik build (out/ üretir)
        run: npm run build

      - name: FTP ile GoDaddy'ye yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # FTP hesabı public_html'e kilitli (Directory = public_html) olduğu
          # için yüklenecek hedef, hesabın kendi kök dizinidir.
          server-dir: ./
