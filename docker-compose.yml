services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ozsaye
      POSTGRES_PASSWORD: ozsaye
      POSTGRES_DB: ozsaye
    ports:
      # Not: bu makinede 5432 zaten yerel bir Homebrew postgresql@17 servisi
      # tarafından kullanılıyor (başka projelerin verisiyle) — çakışmayı
      # önlemek için host tarafında 5433 kullanılıyor. .env.local'daki
      # DATABASE_URL bu port ile eşleşmeli.
      - "5433:5432"
    volumes:
      - ozsaye_pgdata:/var/lib/postgresql/data

volumes:
  ozsaye_pgdata:
